# nvfetcher.toml – package source tracking for pkgs/
# Run: nix run nixpkgs#nvfetcher -- build -c pkgs/nvfetcher.toml -o pkgs/_sources
#
# Version convention:
#   - src.github uses the latest GitHub release tag verbatim (e.g. "v0.23.0", "V1.33.0")
#   - In package.nix, strip the prefix: lib.removePrefix "v" (or "V") src.version
#   - fetch.url packages: $ver is the raw tag (including any v/V prefix)
#   - Exception: libxls uses src.prefix = "v" because the tarball filename omits the "v"

# ============================================================
# Source (fetchFromGitHub) packages
# nvfetcher manages: version + src sha256
# Still manual: cargoHash, vendorHash, build-specific flags
# ============================================================

# Branch-tracked (no release tags): src.git + src.branch → version = latest commit SHA
[VoltageShift]
src.git = "https://github.com/asepms92/VoltageShift.git"
src.branch = "master"
fetch.github = "asepms92/VoltageShift"

[MacKernelSDK]
src.git = "https://github.com/acidanthera/MacKernelSDK.git"
src.branch = "master"
fetch.github = "acidanthera/MacKernelSDK"

[mutt]
src.git = "https://github.com/muttmua/mutt.git"
src.branch = "master"
fetch.github = "muttmua/mutt"

[option-analysis]
src.git = "https://github.com/harsh-vardhhan/option-analysis.git"
src.branch = "master"
fetch.github = "harsh-vardhhan/option-analysis"

# Single-file fetch tracking latest master commit of t2linux/wiki
[get-apple-firmware]
src.git = "https://github.com/t2linux/wiki.git"
src.branch = "master"
fetch.url = "https://raw.githubusercontent.com/t2linux/wiki/$ver/docs/tools/firmware.sh"

[spotify-player]
src.github = "aome510/spotify-player"
fetch.github = "aome510/spotify-player"

[agevault]
src.github = "ndavd/agevault"
fetch.github = "ndavd/agevault"

[ccs-bar]
src.github = "kaitranntt/ccs"
fetch.github = "kaitranntt/ccs"

[dmgwiz]
src.github = "citruz/dmgwiz"
fetch.github = "citruz/dmgwiz"

[tccutil]
src.github = "jacobsalmela/tccutil"
fetch.github = "jacobsalmela/tccutil"

[warpd]
src.github = "atuan26/warpd"
fetch.github = "atuan26/warpd"

[SakuraWallpaper]
# Track upstream main because the universal DMG is published to the moving
# `latest` release, while the current semver release asset is arm64-only.
src.git = "https://github.com/yueseqaz/SakuraWallpaper.git"
src.branch = "main"
fetch.url = "https://github.com/yueseqaz/SakuraWallpaper/releases/download/latest/SakuraWallpaper.dmg"

# ============================================================
# Binary download packages (fetchurl) – fully managed by nvfetcher
# $ver = raw tag string (may include leading v/V)
# ============================================================

[Iris]
src.github = "ahmetb/Iris"
fetch.url = "https://github.com/ahmetb/Iris/releases/download/$ver/Iris-$ver.zip"

[LibreScore]
src.github = "LibreScore/app-librescore"
fetch.url = "https://github.com/LibreScore/app-librescore/releases/download/$ver/LibreScore.dmg"

[Spaceman]
src.github = "ruittenb/Spaceman"
src.prefix = "v"
# Tag "v1.23.4" → version "1.23.4"; asset filename uses bare version (no v prefix)
fetch.url = "https://github.com/ruittenb/Spaceman/releases/download/v$ver/Spaceman-$ver.dmg"

[LosslessSwitcher]
src.github = "vincentneo/LosslessSwitcher"
fetch.url = "https://github.com/vincentneo/LosslessSwitcher/releases/download/$ver/LosslessSwitcher2.app.zip"

[menubar-dock]
src.github = "EthanSK/Menu-Bar-Dock"
fetch.url = "https://github.com/EthanSK/Menu-Bar-Dock/releases/download/$ver/Menu-Bar-Dock-$ver.zip"

[MultiSoundChanger]
src.github = "aonez/MultiSoundChanger"
# Version tag: "1.0.1-BetterDisplay" (no v prefix, compound string – preserved as-is)
fetch.url = "https://github.com/aonez/MultiSoundChanger/releases/download/$ver/MultiSoundChanger+BetterDisplay.zip"

[libxls]
src.github = "libxls/libxls"
src.prefix = "v"
# Tag "v1.6.3" → version "1.6.3"; tarball filename uses version without "v"
fetch.url = "https://github.com/libxls/libxls/releases/download/v$ver/libxls-$ver.tar.gz"

