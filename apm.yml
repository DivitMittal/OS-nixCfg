name: OS-nixCfg
version: 1.0.0
description: Multi-platform Nix flake (darwin, NixOS/WSL, nix-on-droid, home-manager) with universal mkCfg builder
author: DivitMittal
license: MIT
target: all
type: instructions

dependencies:
  mcp:
    - name: serena
      registry: false
      transport: stdio
      command: uvx
      args:
        - --from
        - git+https://github.com/oraios/serena
        - serena
        - start-mcp-server
        - --context
        - claude-code
        - --project
        - ~/OS-nixCfg
    - name: nixos
      registry: false
      transport: stdio
      command: uvx
      args:
        - mcp-nixos
