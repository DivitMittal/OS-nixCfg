# To make changes, edit the workflow definition in your flake's actions-nix configuration
# (typically under flake.actions-nix.workflows.".github/workflows/iso-release.yml") and run:
#   nix run .#render-workflows
# Or commit to trigger the pre-commit hook if enabled.
jobs:
  build-and-release-iso:
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@main
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Install Nix
      uses: nixbuild/nix-quick-install-action@master
    - name: Magic Nix Cache(Use Github Actions Cache)
      uses: DeterminateSystems/magic-nix-cache-action@main
    - name: Configure to use personal binary cache @ Cachix
      uses: cachix/cachix-action@master
      with:
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        name: divitmittal
    - name: SSH-agent with auth for private repos
      uses: webfactory/ssh-agent@master
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    - name: Build iso
      run: nix -vL build --accept-flake-config .#nixosConfigurations.iso.config.system.build.isoImage
        --show-trace -o result-iso
    - name: Build t2-iso
      run: nix -vL build --accept-flake-config .#nixosConfigurations.t2-iso.config.system.build.isoImage
        --show-trace -o result-t2-iso
    - env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_BUCKET: ${{ secrets.R2_BUCKET }}
      name: Upload iso to Cloudflare R2
      run: |-
        ISO_FILE=$(find result-iso/iso -name "*.iso" | head -1)
        ISO_NAME=$(basename "$ISO_FILE")
        aws s3 cp "$ISO_FILE" "s3://$R2_BUCKET/${GITHUB_REF_NAME}/$ISO_NAME" \
          --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
    - env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_BUCKET: ${{ secrets.R2_BUCKET }}
      name: Upload t2-iso to Cloudflare R2
      run: |-
        ISO_FILE=$(find result-t2-iso/iso -name "*.iso" | head -1)
        ISO_NAME=$(basename "$ISO_FILE")
        aws s3 cp "$ISO_FILE" "s3://$R2_BUCKET/${GITHUB_REF_NAME}/$ISO_NAME" \
          --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
    timeout-minutes: 90
'on':
  push:
    tags:
    - iso-v*
